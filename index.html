<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTracker - Néstor</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>💪 FitTracker - Néstor</h1>

    <p id="fecha"></p>

    <section class="card">

        <h2>🌅 Mañana</h2>

        <label>Peso (kg)</label>
        <input type="number" id="pesoManana" step="0.1">

        <label>Perímetro abdominal (cm)</label>
        <input type="number" id="abdomenManana" step="0.1">

    </section>


    <section class="card">

        <h2>🌙 Noche</h2>

        <label>Peso (kg)</label>
        <input type="number" id="pesoNoche" step="0.1">

        <label>Perímetro abdominal (cm)</label>
        <input type="number" id="abdomenNoche" step="0.1">

    </section>


    <section class="card">

        <h2>📊 Datos del día</h2>

        <label>💧 Agua (L)</label>
        <input type="number" id="agua" step="0.1">

        <label>😴 Sueño (horas)</label>
        <input type="number" id="sueno" step="0.1">

        <label>🚶 Pasos</label>
        <input type="number" id="pasos">

        <label>💪 Entrenamiento</label>
        <textarea id="entreno"></textarea>

        <label>🍞 Desayuno</label>
        <textarea id="desayuno"></textarea>

        <label>🍽️ Comida</label>
        <textarea id="comida"></textarea>

        <label>🌙 Cena</label>
        <textarea id="cena"></textarea>

        <label>😊 Energía (1-5)</label>
        <input type="number" min="1" max="5" id="energia">

        <label>😋 Hambre (1-5)</label>
        <input type="number" min="1" max="5" id="hambre">

        <label>📝 Observaciones</label>
        <textarea id="notas"></textarea>

    </section>

    <button id="guardar">
        💾 Finalizar día
    </button>

    <button id="historial">
        📈 Historial
    </button>

    <button id="copiar">
        📋 Copiar resumen para ChatGPT
    </button>

</div>

<script src="script.js"></script>

</body>
</html>
